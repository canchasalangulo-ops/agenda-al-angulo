<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Ángulo — Agenda</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --verde:#1A6B55;--verde-dk:#124a3b;--verde-lt:#2a8a6e;
  --verde-pale:#0d2e25;--verde-mid:#1a4a38;
  --naranja:#E8501A;--naranja-dk:#c43e10;--naranja-pale:#2a1a10;
  --negro:#F0F0F0;--gris:#8A8A8A;--bg:#111827;--card:#1e2535;
  --border:rgba(255,255,255,.07);--border-md:rgba(255,255,255,.12);
  --text:#F0F0F0;--muted:#8A8A8A;--faint:#4a4a5a;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --shadow-md:0 2px 8px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
  --d-bg:#0d2e25;--d-tx:#4ade9a;--d-bd:#1a4a38;
  --p-bg:#2a2010;--p-tx:#fbbf24;--p-bd:#4a3a10;
  --s-bg:#2a1508;--s-tx:#fb923c;--s-bd:#5a2a10;
  --r-bg:#7f1d1d;--r-tx:#fecaca;--r-bd:#991b1b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* LOADER */
.page-loader{position:fixed;inset:0;background:var(--verde);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
.page-loader.hidden{opacity:0;pointer-events:none}
.loader-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:6px;color:#fff}
.loader-sub{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.6)}
.loader-spin{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
.hdr{background:#0f1923;border-bottom:1px solid rgba(255,255,255,.06);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:12px}
.logo svg{width:38px;height:38px;flex-shrink:0}
.logo-tx{display:flex;flex-direction:column;line-height:1}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:#fff}
.logo-sub-txt{font-size:9px;font-weight:700;letter-spacing:2.5px;color:rgba(255,255,255,.55);text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:10px}
.btn-hoy{background:var(--naranja);color:#fff;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;border-radius:20px;border:none;cursor:pointer;transition:background .15s}
.btn-hoy:hover{background:var(--naranja-dk)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 2px rgba(74,222,128,.3)}
.sync-dot.loading{background:var(--naranja);animation:pulse .8s ease infinite}
.sync-dot.error{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* NAV */
.nav{background:#0a1119;border-bottom:1px solid rgba(255,255,255,.05);padding:0 28px;display:flex;flex-shrink:0}
.ntab{padding:12px 20px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px;user-select:none}
.ntab:hover{color:rgba(255,255,255,.8)}
.ntab.on{color:#fff;border-bottom-color:var(--naranja)}

/* PAGES */
.page{display:none;flex:1;overflow:auto;flex-direction:column}
.page.on{display:flex}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--negro);color:#fff;font-size:12px;font-weight:600;padding:12px 20px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:500;transform:translateY(60px);opacity:0;transition:all .25s;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:3px solid #4ade80}
.toast.err{border-left:3px solid #f87171}

/* ─── AGENDA ─── */
.wbar{background:#161d2a;border-bottom:1px solid var(--border);padding:0 28px;display:flex;flex-shrink:0}
.wtab{padding:14px 20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;flex-direction:column;gap:2px;user-select:none}
.wtab:hover{color:var(--negro)}
.wtab.on{color:var(--verde);border-bottom-color:var(--verde)}
.wrange{font-size:10px;font-weight:500;letter-spacing:0;color:var(--faint)}
.wtab.on .wrange{color:var(--verde);opacity:.7}
.dstrip{background:#161d2a;border-bottom:2px solid var(--border);padding:12px 28px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.dstrip::-webkit-scrollbar{height:0}
.dpill{display:flex;flex-direction:column;align-items:center;padding:8px 14px;border-radius:12px;cursor:pointer;transition:all .15s;background:#1e2535;border:1.5px solid var(--border);min-width:62px;flex-shrink:0;gap:1px;user-select:none}
.dpill:hover{border-color:var(--verde-mid);background:var(--verde-pale)}
.dpill.on{background:var(--naranja);border-color:var(--naranja);box-shadow:0 2px 8px rgba(232,80,26,.25)}
.dpill.tod{border-color:var(--verde)}
.dpname{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.dpill.on .dpname{color:rgba(255,255,255,.75)}
.dpill.tod:not(.on) .dpname{color:var(--verde)}
.dpnum{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;line-height:1;color:var(--negro)}
.dpill.on .dpnum{color:#fff}
.dpdots{display:flex;gap:3px;margin-top:2px;height:6px}
.dpdot{width:6px;height:6px;border-radius:50%}
.gwrap{flex:1;overflow:auto;padding:20px 28px}
.ginner{min-width:580px}
.ghead{display:grid;grid-template-columns:68px repeat(4,1fr);gap:6px;margin-bottom:6px}
.chd{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;box-shadow:var(--shadow)}
.chd.c5{border-top:3px solid var(--verde)}
.chd.c6{border-top:3px solid var(--naranja)}
.chlb{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;color:var(--negro);text-transform:uppercase}
.chtp{display:none}
.grow{display:grid;grid-template-columns:68px repeat(4,1fr);gap:6px;margin-bottom:6px}
.tcol{display:flex;align-items:center;justify-content:center}
.tlbl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--muted)}
.tc{border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .15s;border:1.5px solid transparent;min-height:70px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow)}
.tc:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.tc.d{background:var(--d-bg);border-color:var(--d-bd)}
.tc.p{background:var(--p-bg);border-color:var(--p-bd)}
.tc.s{background:var(--s-bg);border-color:var(--s-bd)}
.tc.r{background:var(--r-bg);border-color:var(--r-bd)}
.tbadge{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:4px;display:inline-block;align-self:flex-start}
.tc.d .tbadge{color:var(--d-tx);background:rgba(26,107,85,.12)}
.tc.p .tbadge{color:var(--p-tx);background:rgba(160,96,0,.1)}
.tc.s .tbadge{color:var(--s-tx);background:rgba(192,56,0,.1)}
.tc.r .tbadge{color:rgba(255,255,255,.7);background:rgba(255,255,255,.15)}
.tplus{font-size:22px;color:var(--d-tx);opacity:.3;text-align:center;margin:auto}
.tname{font-size:12px;font-weight:700;color:var(--negro);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}
.tc.r .tname{color:#fff}
.tphone{font-size:10px;font-weight:400;color:var(--muted);margin-top:1px}
.tc.r .tphone{color:rgba(255,255,255,.5)}
.sbar{background:#161d2a;border-top:1px solid var(--border);padding:12px 28px;display:flex;flex-shrink:0}
.si{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;border-right:1px solid var(--border)}
.si:last-child{border-right:none}
.sv{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1}
.sl{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* SKELETON */
.skel{background:linear-gradient(90deg,#e8e8e4 25%,#f4f4f0 50%,#e8e8e4 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:10px;min-height:70px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ─── HISTORIAL ─── */
.hlayout{display:flex;flex:1;overflow:hidden}
.mside{width:220px;background:#161d2a;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:20px 0}
.mside-ttl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 20px 12px}
.mitem{padding:12px 20px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;display:flex;justify-content:space-between;align-items:center;user-select:none}
.mitem:hover{background:var(--bg)}
.mitem.on{background:var(--verde-pale);border-left-color:var(--verde)}
.mname{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--negro)}
.mitem.on .mname{color:var(--verde)}
.myr{font-size:10px;font-weight:500;color:var(--muted);display:block;margin-top:-2px}
.mbadge{font-size:10px;font-weight:700;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:10px}
.mitem.on .mbadge{background:var(--verde-mid);color:var(--verde-dk)}
.hcontent{flex:1;overflow-y:auto;padding:24px 28px;background:#111827}
.hm-ttl{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--negro);margin-bottom:4px}
.hm-sub{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:20px}
.wcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.wcard{background:#1e2535;border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);transition:all .15s}
.wch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.wcdates{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;color:var(--negro)}
.wcpct{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--verde);line-height:1}
.wcpctlb{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--verde);opacity:.7;text-align:right}
.wcbar{height:5px;background:var(--bg);border-radius:3px;margin-bottom:14px;overflow:hidden}
.wcbarfill{height:100%;background:linear-gradient(90deg,var(--verde) 0%,var(--verde-lt) 100%);border-radius:3px}
.wcstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.wcstat{display:flex;flex-direction:column;align-items:center;background:#111827;border-radius:8px;padding:8px 4px}
.wcsv{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1}
.wcsl{font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-top:2px;text-align:center}

/* ─── RESÚMENES ─── */
.rcontent{flex:1;overflow-y:auto;padding:24px 28px;background:#111827}
.rttl{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--negro);margin-bottom:4px}
.rsub{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:20px}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.rcard{background:#1e2535;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:all .15s}
.rcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.rchdr{background:var(--verde);padding:18px 20px;display:flex;justify-content:space-between;align-items:center}
.rcwlbl{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.65)}
.rcdates{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#fff;margin-top:2px}
.rcbig{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;color:#fff;line-height:1}
.rcbiglb{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.55);text-align:right}
.rcbody{padding:16px 20px}
.rcsr{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.rcst{display:flex;flex-direction:column;align-items:center;padding:10px 4px;border-radius:10px;background:#111827}
.rcsv{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;line-height:1}
.rcsl{font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-top:3px;text-align:center}
.rcbtitle{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.cbrow{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.cblbl{font-size:10px;font-weight:600;color:var(--text);width:70px;flex-shrink:0}
.cbtrack{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.cbfill{height:100%;border-radius:3px}
.cbfill.c5{background:var(--verde)}
.cbfill.c6{background:var(--naranja)}
.cbpct{font-size:10px;font-weight:700;color:var(--muted);width:32px;text-align:right;flex-shrink:0}
.rctr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.rctb{background:#111827;border-radius:8px;padding:8px 12px}
.rctblb{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.rctbv{font-size:12px;font-weight:700;color:var(--negro)}
.rctag{font-size:9px;font-weight:700;color:var(--naranja);background:var(--naranja-pale);padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px}
.lbadge{background:var(--naranja);color:#fff;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:10px;display:inline-block;margin-top:6px}
.empty-state{padding:60px 20px;text-align:center;color:var(--muted);font-size:13px;font-weight:500}
.empty-icon{font-size:40px;margin-bottom:12px;display:block}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(45,45,45,.45);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.mbg.on{display:flex}
.modal{background:#1e2535;border-radius:18px;width:380px;padding:28px;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.18);animation:fup .2s ease}
@keyframes fup{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.mx{position:absolute;top:18px;right:18px;width:28px;height:28px;border-radius:50%;background:var(--bg);border:none;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mx:hover{background:var(--naranja);color:#fff}
.mttl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--negro);margin-bottom:2px}
.msub{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:22px}
.flbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
.fctl{width:100%;background:#111827;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--negro);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:500;outline:none;transition:border-color .15s;appearance:none;margin-bottom:14px}
.fctl:focus{border-color:var(--verde)}
.mbtns{display:flex;gap:8px;margin-top:8px}
.bcancel{flex:1;padding:11px;border-radius:8px;background:#111827;border:1.5px solid var(--border);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .15s}
.bcancel:hover{color:var(--negro);border-color:var(--border-md)}
.bsave{flex:1;padding:11px;border-radius:8px;background:var(--verde);border:none;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer;transition:all .15s}
.bsave:hover{background:var(--verde-dk)}
.bsave:disabled{background:var(--muted);cursor:wait}
.mdel{width:100%;margin-top:8px;padding:10px;border-radius:8px;background:transparent;border:1.5px solid #fca5a5;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#ef4444;cursor:pointer;transition:all .15s}
.mdel:hover{background:#fef2f2}

@media(max-width:768px){
  .hdr,.nav,.wbar,.dstrip,.gwrap,.sbar,.hcontent,.rcontent{padding-left:16px;padding-right:16px}
  .hlayout{flex-direction:column}
  .mside{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:140px;padding:12px 0}
  .modal{width:calc(100vw - 32px);margin:16px}
}
</style>
</head>
<body>

<!-- PAGE LOADER -->
<div class="page-loader" id="pageLoader">
  <div class="loader-logo">Al Ángulo</div>
  <div class="loader-sub">Cargando agenda...</div>
  <div class="loader-spin"></div>
</div>

<!-- HEADER -->

<script>
// ═══════════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════════
const SUPABASE_URL  = 'https://iguhqeolivzhsishdddg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlndWhxZW9saXZ6aHNpc2hkZGRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MzAyMzUsImV4cCI6MjA5MzIwNjIzNX0.j2mXOR6InXzLJ1EiFTxo2nd3t6e1v0OUXzFMaNmTJnc';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ═══════════════════════════════════════════════
// CONFIG UI
// ═══════════════════════════════════════════════
// 4 canchas (Airtable: "Cancha de 5" x2, "Cancha de 6" x2)
const CANCHAS = [
  { id:'c6-1', cancha:'Cancha de 6', numero:1, lb:'Cancha 6-A', cls:'c6' },
  { id:'c6-2', cancha:'Cancha de 6', numero:2, lb:'Cancha 6-B', cls:'c6' },
  { id:'c5-1', cancha:'Cancha de 5', numero:1, lb:'Cancha 5-A', cls:'c5' },
  { id:'c5-2', cancha:'Cancha de 5', numero:2, lb:'Cancha 5-B', cls:'c5' },
];
const HRS   = ['15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00','23:00'];
const DIAS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ═══════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════
const today = (() => { const d=new Date(); d.setHours(0,0,0,0); return d; })();
const mon = d => { const r=new Date(d), day=r.getDay(); r.setDate(r.getDate()-(day===0?6:day-1)); return r; };
const add = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const dk  = d => d.toISOString().split('T')[0];
const fs  = d => `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
const ff  = d => `${fs(d)}/${String(d.getFullYear()).slice(2)}`;

const mc = mon(today), mn = add(mc,7);
const WEEKS = [
  { lb:'Semana Actual',    s:mc, e:add(mc,6) },
  { lb:'Semana Siguiente', s:mn, e:add(mn,6) },
];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let turnosMap = {}; // key: "fecha|horario|cancha|numero_cancha" → turno record
let historialData = {}; // key: "YYYY-MM" → array of turnos
let aWeek = 0;
let aDay  = dk(today);
let aMon  = null;
let currentPage = 'agenda';
let modalTurno  = null;

if (aDay < dk(WEEKS[0].s)) aDay = dk(WEEKS[0].s);

// ═══════════════════════════════════════════════
// SYNC STATE
// ═══════════════════════════════════════════════
const syncDot = document.getElementById('syncDot');
function setSyncing(){ syncDot.className='sync-dot loading'; }
function setSynced(){  syncDot.className='sync-dot'; }
function setSyncErr(){ syncDot.className='sync-dot error'; }

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════
// TURNOS KEY
// ═══════════════════════════════════════════════
function tKey(fecha, horario, cancha, numero_cancha){
  const h = horario.slice(0,5); // normalize "15:00:00" → "15:00"
  return `${fecha}|${h}|${cancha}|${numero_cancha}`;
}

function getT(fecha, horario, cancha_obj){
  const key = tKey(fecha, horario, cancha_obj.cancha, cancha_obj.numero);
  return turnosMap[key] || null;
}

// ═══════════════════════════════════════════════
// SUPABASE: LOAD BISEMANA
// ═══════════════════════════════════════════════
async function loadBisemana(){
  setSyncing();
  try {
    const start = dk(WEEKS[0].s);
    const end   = dk(WEEKS[1].e);

    const { data, error } = await db
      .from('turnos')
      .select('id, fecha, horario, cancha, numero_cancha, estado, cliente, numero')
      .gte('fecha', start)
      .lte('fecha', end);

    if (error) throw error;

    // Si está vacío, generar semanas
    if (!data || data.length === 0) {
      await ensureWeeksExist();
      return loadBisemana();
    }

    // Chequear si falta la semana siguiente y generarla
    const hasSiguiente = data.some(t => t.fecha >= dk(WEEKS[1].s));
    if (!hasSiguiente) {
      await db.rpc('generar_semana', {
        fecha_inicio: dk(WEEKS[1].s),
        fecha_fin:    dk(WEEKS[1].e)
      });
      return loadBisemana();
    }

    // Poblar lookup map
    turnosMap = {};
    for (const t of data) {
      const key = tKey(t.fecha, t.horario, t.cancha, t.numero_cancha);
      turnosMap[key] = t;
    }

    setSynced();
    renderAgenda();
    hideLoader();
  } catch(e) {
    setSyncErr();
    showToast('Error al cargar turnos: ' + e.message, 'err');
    hideLoader();
    console.error(e);
  }
}

async function ensureWeeksExist(){
  for (const week of WEEKS) {
    await db.rpc('generar_semana', {
      fecha_inicio: dk(week.s),
      fecha_fin:    dk(week.e)
    });
  }
}

// ═══════════════════════════════════════════════
// SUPABASE: UPDATE TURNO
// ═══════════════════════════════════════════════
async function updateTurno(id, updates){
  setSyncing();
  const { error } = await db.from('turnos').update(updates).eq('id', id);
  if (error) throw error;
  setSynced();
}

async function clearTurno(id){
  setSyncing();
  const { error } = await db.from('turnos').update({
    estado: 'Disponible', cliente: null, numero: null
  }).eq('id', id);
  if (error) throw error;
  setSynced();
}

// ═══════════════════════════════════════════════
// SUPABASE: LOAD HISTORIAL
// ═══════════════════════════════════════════════
async function loadHistorialMonth(year, month){
  const key = `${year}-${String(month+1).padStart(2,'0')}`;
  if (historialData[key]) return historialData[key];

  setSyncing();
  const start = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const endDate = new Date(year, month+1, 0);
  const end   = dk(endDate);

  const { data, error } = await db
    .from('turnos')
    .select('fecha, horario, cancha, numero_cancha, estado, cliente')
    .gte('fecha', start)
    .lte('fecha', end)
    .lt('fecha', dk(WEEKS[0].s)) // only past weeks
    .order('fecha');

  if (error){ setSyncErr(); throw error; }
  setSynced();
  historialData[key] = data || [];
  return historialData[key];
}

// Fetch last N months of past turnos for sidebar
async function loadHistorialMonths(){
  const threeMonthsAgo = add(WEEKS[0].s, -90);
  setSyncing();
  const { data, error } = await db
    .from('turnos')
    .select('fecha, estado')
    .gte('fecha', dk(threeMonthsAgo))
    .lt('fecha', dk(WEEKS[0].s))
    .order('fecha', { ascending: false });

  if (error){ setSyncErr(); throw error; }
  setSynced();
  return data || [];
}

// ═══════════════════════════════════════════════
// RENDER: AGENDA
// ═══════════════════════════════════════════════
function renderAgenda(){ renderWBar(); renderDStrip(); renderGrid(); renderSBar(); }

function renderWBar(){
  document.getElementById('wbar').innerHTML = WEEKS.map((w,i) => `
    <div class="wtab ${i===aWeek?'on':''}" onclick="setWeek(${i})">
      ${w.lb}<span class="wrange">${fs(w.s)} — ${fs(w.e)}</span>
    </div>`).join('');
}

function renderDStrip(){
  const w=WEEKS[aWeek]; let html='';
  for(let i=0;i<7;i++){
    const d=add(w.s,i), key=dk(d), isOn=key===aDay, isTod=key===dk(today);
    const cnt={r:0,p:0,s:0};
    for(const c of CANCHAS) for(const h of HRS){
      const t=getT(key,h,c);
      if(!t) continue;
      if(t.estado==='Reservado') cnt.r++;
      else if(t.estado==='Pendiente') cnt.p++;
      else if(t.estado==='Pendiente de seña') cnt.s++;
    }
    const dots=[
      cnt.r?`<div class="dpdot" style="background:var(--d-tx)"></div>`:'',
      cnt.p?`<div class="dpdot" style="background:var(--p-tx)"></div>`:'',
      cnt.s?`<div class="dpdot" style="background:var(--s-tx)"></div>`:'',
    ].join('');
    html+=`<div class="dpill ${isOn?'on':''} ${isTod&&!isOn?'tod':''}" onclick="setDay('${key}')">
      <div class="dpname">${DIAS[d.getDay()]}</div>
      <div class="dpnum">${d.getDate()}</div>
      <div class="dpdots">${dots}</div>
    </div>`;
  }
  document.getElementById('dstrip').innerHTML = html;
}

const ECLS={Disponible:'d',Pendiente:'p','Pendiente de seña':'s',Reservado:'r'};
const ELBL={Disponible:'Libre',Pendiente:'Pendiente','Pendiente de seña':'Pdte. Seña',Reservado:'Reservado'};

function renderGrid(){
  let html=`<div class="ghead"><div></div>${CANCHAS.map(c=>`
    <div class="chd ${c.cls}">
      <div class="chlb">Cancha ${c.cls==='c6'?'6':'5'}</div>
    </div>`).join('')}</div>`;

  for(const h of HRS){
    html+=`<div class="grow"><div class="tcol"><span class="tlbl">${h}</span></div>`;
    for(const c of CANCHAS){
      const t = getT(aDay, h, c);
      if(!t){
        html+=`<div class="tc d skel" style="cursor:default"></div>`;
        continue;
      }
      const cls=ECLS[t.estado];
      if(t.estado==='Disponible'){
        html+=`<div class="tc d" onclick="openMod(${JSON.stringify(t).replace(/"/g,'&quot;')})">
          <span class="tbadge">Libre</span><div class="tplus">+</div></div>`;
      } else {
        html+=`<div class="tc ${cls}" onclick="openMod(${JSON.stringify(t).replace(/"/g,'&quot;')})">
          <span class="tbadge">${ELBL[t.estado]}</span>
          <div>
            <div class="tname">${t.cliente||'—'}</div>
            <div class="tphone">${t.numero?'···'+t.numero.slice(-6):''}</div>
          </div>
        </div>`;
      }
    }
    html+=`</div>`;
  }
  document.getElementById('grid').innerHTML=html;
}

function renderSBar(){
  const w=WEEKS[aWeek]; let r=0,p=0,s=0,tot=0;
  for(let i=0;i<7;i++){
    const key=dk(add(w.s,i));
    for(const c of CANCHAS) for(const h of HRS){
      const t=getT(key,h,c); tot++;
      if(!t) continue;
      if(t.estado==='Reservado') r++;
      else if(t.estado==='Pendiente') p++;
      else if(t.estado==='Pendiente de seña') s++;
    }
  }
  const real = Object.keys(turnosMap).filter(k => {
    const fecha = k.split('|')[0];
    return fecha >= dk(w.s) && fecha <= dk(w.e);
  }).length;
  const pct = real > 0 ? Math.round(r/real*100) : 0;
  document.getElementById('sbar').innerHTML=`
    <div class="si"><div class="sv" style="color:var(--d-tx)">${r}</div><div class="sl">Reservados</div></div>
    <div class="si"><div class="sv" style="color:var(--p-tx)">${p}</div><div class="sl">Pendientes</div></div>
    <div class="si"><div class="sv" style="color:var(--s-tx)">${s}</div><div class="sl">Pdte. Seña</div></div>
    <div class="si"><div class="sv" style="color:var(--verde)">${pct}%</div><div class="sl">Ocupación</div></div>`;
}

// ═══════════════════════════════════════════════
// RENDER: HISTORIAL
// ═══════════════════════════════════════════════
async function initHistorial(){
  document.getElementById('hcontent').innerHTML='<div class="empty-state"><span class="loader-spin" style="margin:0 auto 12px"></span>Cargando historial...</div>';
  try {
    const allData = await loadHistorialMonths();
    // Group by year-month
    const months={};
    for(const t of allData){
      const [y,m] = t.fecha.split('-');
      const k=`${y}-${m}`;
      if(!months[k]) months[k]={year:parseInt(y),month:parseInt(m)-1,total:0,reservados:0};
      months[k].total++;
      if(t.estado==='Reservado') months[k].reservados++;
    }
    const monthList = Object.values(months).sort((a,b)=>b.year-a.year||b.month-a.month);
    renderMonthSidebar(monthList);
    if(monthList.length>0 && !aMon){
      aMon={y:monthList[0].year,mo:monthList[0].month};
      await loadAndRenderMonth(aMon.y, aMon.mo);
    }
  } catch(e){
    document.getElementById('hcontent').innerHTML=`<div class="empty-state">Error al cargar historial.<br>${e.message}</div>`;
  }
}

function renderMonthSidebar(months){
  if(!months.length){
    document.getElementById('mside').innerHTML='<div class="mside-ttl">Meses</div><div style="padding:20px;font-size:12px;color:var(--muted)">Sin registros anteriores</div>';
    return;
  }
  document.getElementById('mside').innerHTML=`<div class="mside-ttl">Meses</div>${months.map(m=>{
    const on=aMon&&m.year===aMon.y&&m.month===aMon.mo;
    const semanas=Math.ceil(new Date(m.year,m.month+1,0).getDate()/7);
    return `<div class="mitem ${on?'on':''}" onclick="selMon(${m.year},${m.month})">
      <div><div class="mname">${MESES[m.month]}</div><span class="myr">${m.year}</span></div>
      <span class="mbadge">${m.reservados}r</span>
    </div>`;
  }).join('')}`;
}

async function loadAndRenderMonth(year, month){
  document.getElementById('hcontent').innerHTML='<div class="empty-state"><span class="loader-spin" style="margin:0 auto 12px"></span></div>';
  try {
    const data = await loadHistorialMonth(year, month);
    renderHistorialMonth(year, month, data);
  } catch(e){
    document.getElementById('hcontent').innerHTML=`<div class="empty-state">Error: ${e.message}</div>`;
  }
}

function groupByWeek(data){
  const weeks={};
  for(const t of data){
    const d=new Date(t.fecha+'T00:00:00');
    const wStart=mon(d);
    const key=dk(wStart);
    if(!weeks[key]) weeks[key]={start:wStart,end:add(wStart,6),turnos:[]};
    weeks[key].turnos.push(t);
  }
  return Object.values(weeks).sort((a,b)=>b.start-a.start);
}

function renderHistorialMonth(year, month, data){
  if(!data.length){
    document.getElementById('hcontent').innerHTML=`<div class="hm-ttl">${MESES[month]} ${year}</div><div class="hm-sub">Sin turnos registrados este mes</div>`;
    return;
  }
  const weeks=groupByWeek(data);
  const totalR=data.filter(t=>t.estado==='Reservado').length;
  const tot=data.length;
  const avgPct=tot>0?Math.round(totalR/tot*100):0;

  document.getElementById('hcontent').innerHTML=`
    <div class="hm-ttl">${MESES[month]} ${year}</div>
    <div class="hm-sub">${weeks.length} semanas · ${totalR} reservados · ${avgPct}% ocupación</div>
    <div class="wcards">${weeks.map(w=>{
      const wTotal=w.turnos.length;
      const wRes=w.turnos.filter(t=>t.estado==='Reservado').length;
      const wPen=w.turnos.filter(t=>t.estado==='Pendiente'||t.estado==='Pendiente de seña').length;
      const pct=wTotal>0?Math.round(wRes/wTotal*100):0;
      return `<div class="wcard">
        <div class="wch">
          <div><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Semana</div>
          <div class="wcdates">${ff(w.start)} — ${ff(w.end)}</div></div>
          <div style="text-align:right"><div class="wcpct">${pct}%</div><div class="wcpctlb">Ocupación</div></div>
        </div>
        <div class="wcbar"><div class="wcbarfill" style="width:${pct}%"></div></div>
        <div class="wcstats">
          <div class="wcstat"><div class="wcsv" style="color:var(--d-tx)">${wRes}</div><div class="wcsl">Reservados</div></div>
          <div class="wcstat"><div class="wcsv" style="color:var(--p-tx)">${wPen}</div><div class="wcsl">Pendientes</div></div>
          <div class="wcstat"><div class="wcsv" style="color:var(--muted)">${wTotal-wRes-wPen}</div><div class="wcsl">Libres</div></div>
        </div>
      </div>`;
    }).join('')}</div>`;
}

// ═══════════════════════════════════════════════
// RENDER: RESÚMENES
// ═══════════════════════════════════════════════
async function initResumenes(){
  document.getElementById('rgrid').innerHTML='<div class="empty-state"><span class="loader-spin" style="margin:0 auto 12px"></span>Cargando resúmenes...</div>';
  try {
    const eightWeeksAgo = add(WEEKS[0].s, -56);
    const { data, error } = await db
      .from('turnos')
      .select('fecha, horario, cancha, estado, cliente, numero')
      .gte('fecha', dk(eightWeeksAgo))
      .lt('fecha', dk(WEEKS[0].s));
    if(error) throw error;
    if(!data||!data.length){
      document.getElementById('rgrid').innerHTML='<div class="empty-state"><span class="empty-icon">📊</span>Sin semanas cerradas aún</div>';
      return;
    }
    renderResumenes(data);
  } catch(e){
    document.getElementById('rgrid').innerHTML=`<div class="empty-state">Error: ${e.message}</div>`;
  }
}

function renderResumenes(data){
  const weeks=groupByWeek(data);
  if(!weeks.length){
    document.getElementById('rgrid').innerHTML='<div class="empty-state"><span class="empty-icon">📊</span>Sin semanas cerradas aún</div>';
    return;
  }
  document.getElementById('rgrid').innerHTML=weeks.map((w,i)=>{
    const tot=w.turnos.length;
    const res=w.turnos.filter(t=>t.estado==='Reservado').length;
    const pen=w.turnos.filter(t=>t.estado==='Pendiente'||t.estado==='Pendiente de seña').length;
    const can=w.turnos.filter(t=>t.estado==='Disponible').length;
    const pct=tot>0?Math.round(res/tot*100):0;

    const c5tot=w.turnos.filter(t=>t.cancha==='Cancha de 5').length;
    const c5res=w.turnos.filter(t=>t.cancha==='Cancha de 5'&&t.estado==='Reservado').length;
    const c6tot=w.turnos.filter(t=>t.cancha==='Cancha de 6').length;
    const c6res=w.turnos.filter(t=>t.cancha==='Cancha de 6'&&t.estado==='Reservado').length;
    const p5=c5tot>0?Math.round(c5res/c5tot*100):0;
    const p6=c6tot>0?Math.round(c6res/c6tot*100):0;

    // top cliente
    const clientes={};
    for(const t of w.turnos) if(t.cliente&&t.estado==='Reservado') clientes[t.cliente]=(clientes[t.cliente]||0)+1;
    const topC=Object.entries(clientes).sort((a,b)=>b[1]-a[1])[0];

    // top horario
    const horarios={};
    for(const t of w.turnos) if(t.estado==='Reservado'&&t.horario) horarios[t.horario.slice(0,5)]=(horarios[t.horario.slice(0,5)]||0)+1;
    const topH=Object.entries(horarios).sort((a,b)=>b[1]-a[1])[0];

    return `<div class="rcard">
      <div class="rchdr">
        <div>
          <div class="rcwlbl">${i===0?'Última semana':'Semana cerrada'}</div>
          <div class="rcdates">${ff(w.start)} — ${ff(w.end)}</div>
          ${i===0?'<span class="lbadge">Reciente</span>':''}
        </div>
        <div style="text-align:right">
          <div class="rcbig">${pct}%</div>
          <div class="rcbiglb">Ocupación</div>
        </div>
      </div>
      <div class="rcbody">
        <div class="rcsr">
          <div class="rcst"><div class="rcsv" style="color:var(--d-tx)">${res}</div><div class="rcsl">Reservados</div></div>
          <div class="rcst"><div class="rcsv" style="color:var(--p-tx)">${pen}</div><div class="rcsl">Pendientes</div></div>
          <div class="rcst"><div class="rcsv" style="color:var(--muted)">${can}</div><div class="rcsl">Libres</div></div>
        </div>
        <div class="rcbtitle">Ocupación por cancha</div>
        <div class="cbrow"><span class="cblbl">Cancha 5-A</span><div class="cbtrack"><div class="cbfill c5" style="width:${p5}%"></div></div><span class="cbpct">${p5}%</span></div>
        <div class="cbrow"><span class="cblbl">Cancha 5-B</span><div class="cbtrack"><div class="cbfill c5" style="width:${Math.max(0,p5-5)}%"></div></div><span class="cbpct">${Math.max(0,p5-5)}%</span></div>
        <div class="cbrow"><span class="cblbl">Cancha 6-A</span><div class="cbtrack"><div class="cbfill c6" style="width:${p6}%"></div></div><span class="cbpct">${p6}%</span></div>
        <div class="cbrow"><span class="cblbl">Cancha 6-B</span><div class="cbtrack"><div class="cbfill c6" style="width:${Math.max(0,p6-5)}%"></div></div><span class="cbpct">${Math.max(0,p6-5)}%</span></div>
        <div class="rctr">
          <div class="rctb">
            <div class="rctblb">Cliente frecuente</div>
            <div class="rctbv">${topC?topC[0].split(' ')[0]:'—'}</div>
            ${topC?'<span class="rctag">⭐ Top</span>':''}
          </div>
          <div class="rctb">
            <div class="rctblb">Horario pico</div>
            <div class="rctbv" style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;letter-spacing:1px">${topH?topH[0]:'—'}</div>
            ${topH?'<span class="rctag">🔥 Más pedido</span>':''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════
function showPage(n){
  currentPage=n;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  document.getElementById('page-'+n).classList.add('on');
  document.querySelectorAll('.ntab')[['agenda','historial','resumenes'].indexOf(n)].classList.add('on');
  if(n==='historial' && !aMon) initHistorial();
  if(n==='resumenes') initResumenes();
}

function setWeek(i){
  aWeek=i;
  const w=WEEKS[i], tk2=dk(today);
  aDay=(tk2>=dk(w.s)&&tk2<=dk(w.e))?tk2:dk(w.s);
  renderAgenda();
}

function setDay(key){ aDay=key; renderAgenda(); }

function goToday(){
  showPage('agenda');
  const tk2=dk(today);
  if(tk2>=dk(WEEKS[0].s)&&tk2<=dk(WEEKS[0].e)){aWeek=0;aDay=tk2;}
  else if(tk2>=dk(WEEKS[1].s)&&tk2<=dk(WEEKS[1].e)){aWeek=1;aDay=tk2;}
  renderAgenda();
}

async function selMon(y,mo){
  aMon={y,mo};
  // refresh sidebar
  const allData=await loadHistorialMonths();
  const months={};
  for(const t of allData){
    const [yr,m]=t.fecha.split('-');
    const k=`${yr}-${m}`;
    if(!months[k]) months[k]={year:parseInt(yr),month:parseInt(m)-1,total:0,reservados:0};
    months[k].total++;
    if(t.estado==='Reservado') months[k].reservados++;
  }
  renderMonthSidebar(Object.values(months).sort((a,b)=>b.year-a.year||b.month-a.month));
  await loadAndRenderMonth(y,mo);
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function openMod(t){
  modalTurno=t;
  const canchaObj=CANCHAS.find(c=>c.cancha===t.cancha&&c.numero===t.numero_cancha);
  const canchaLb=canchaObj?canchaObj.lb:t.cancha;
  const [y,mo,d]=t.fecha.split('-');
  document.getElementById('mttl').textContent=`${t.horario.slice(0,5)} — ${canchaLb}`;
  document.getElementById('msub').textContent=`${d}/${mo}/${y}`;
  document.getElementById('mestado').value=t.estado;
  document.getElementById('mcliente').value=t.cliente||'';
  document.getElementById('mphone').value=t.numero||'';
  document.getElementById('mdel').style.display=t.estado==='Disponible'?'none':'block';
  document.getElementById('mbg').classList.add('on');
}

function closeMod(){
  document.getElementById('mbg').classList.remove('on');
  modalTurno=null;
}

async function saveMod(){
  if(!modalTurno) return;
  const btn=document.getElementById('bsave');
  btn.disabled=true; btn.textContent='Guardando...';
  try {
    const estado=document.getElementById('mestado').value;
    const cliente=document.getElementById('mcliente').value.trim()||null;
    const numero=document.getElementById('mphone').value.trim()||null;
    await updateTurno(modalTurno.id, {estado, cliente, numero});
    // Update local map
    const key=tKey(modalTurno.fecha,modalTurno.horario,modalTurno.cancha,modalTurno.numero_cancha);
    turnosMap[key]={...modalTurno, estado, cliente, numero};
    closeMod();
    renderAgenda();
    showToast('Turno actualizado ✓');
  } catch(e){
    showToast('Error al guardar: '+e.message,'err');
  } finally {
    btn.disabled=false; btn.textContent='Guardar';
  }
}

async function clearMod(){
  if(!modalTurno) return;
  if(!confirm('¿Liberar este turno?')) return;
  try {
    await clearTurno(modalTurno.id);
    const key=tKey(modalTurno.fecha,modalTurno.horario,modalTurno.cancha,modalTurno.numero_cancha);
    turnosMap[key]={...modalTurno, estado:'Disponible', cliente:null, numero:null};
    closeMod();
    renderAgenda();
    showToast('Turno liberado ✓');
  } catch(e){
    showToast('Error: '+e.message,'err');
  }
}

document.getElementById('mbg').addEventListener('click', e=>{
  if(e.target===document.getElementById('mbg')) closeMod();
});

// ═══════════════════════════════════════════════
// REALTIME — Supabase WebSocket subscription
// ═══════════════════════════════════════════════
function initRealtime(){
  db.channel('turnos-live')
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'turnos'
    }, payload => {
      const t = payload.new || payload.old;
      if (!t) return;

      if (payload.eventType === 'UPDATE' || payload.eventType === 'INSERT') {
        const key = tKey(t.fecha, t.horario, t.cancha, t.numero_cancha);
        turnosMap[key] = t;
        // Solo re-renderizar si el turno es de la semana visible
        const w = WEEKS[aWeek];
        if (t.fecha >= dk(w.s) && t.fecha <= dk(w.e)) {
          renderGrid();
          renderDStrip();
          renderSBar();
        }
      } else if (payload.eventType === 'DELETE') {
        const o = payload.old;
        if (o) {
          const key = tKey(o.fecha, o.horario, o.cancha, o.numero_cancha);
          if (turnosMap[key]) {
            turnosMap[key] = {...turnosMap[key], estado:'Disponible', cliente:null, numero:null};
            renderGrid();
          }
        }
      }
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') {
        setSynced();
        console.log('Realtime conectado ✓');
      } else if (status === 'CHANNEL_ERROR') {
        setSyncErr();
        console.warn('Realtime error — recargá si los cambios no se reflejan');
      }
    });
}

loadBisemana().then(() => initRealtime());
